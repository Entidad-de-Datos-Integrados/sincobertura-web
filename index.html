<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>SinCobertura.com — Dominio premium en venta</title>

    <meta name="description" content="Adquiere SinCobertura.com, un dominio memorable y potente para telecomunicaciones, conectividad, redes y tecnología.">
    <meta name="keywords" content="dominio premium, telecomunicaciones, wifi, redes, conectividad">

    <meta property="og:title" content="SinCobertura.com en venta">
    <meta property="og:description" content="Un dominio memorable para construir una gran marca tech">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="particles-js" aria-hidden="true"></div>

<header class="top-banner">
    <i class="fas fa-crown"></i>
    DOMINIO PREMIUM EN VENTA
    <a href="#contact">Adquirir ahora</a>
</header>

<main>

<!-- HERO -->
<section class="hero">
    <div class="container hero-content">

        <h1>Sin<span>Cobertura</span>.com</h1>

        <p class="hero-description">
            Dominio premium para telecomunicaciones, conectividad y tecnología.
        </p>

        <div class="badge-price">
            <span>$3,900 USD</span>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section class="contact-section" id="contact">
<div class="container">

<h2>Haz tu oferta</h2>

<div class="contact-container">

<form id="contactForm" action="/api/contact" method="POST" novalidate>

    <div class="form-group">
        <label for="formName">Nombre / Empresa *</label>
        <input type="text" id="formName" name="name" required autocomplete="name">
    </div>

    <div class="form-group">
        <label for="formEmail">Email *</label>
        <input type="email" id="formEmail" name="email" required autocomplete="email">
    </div>

    <div class="form-group">
        <label for="formOffer">Oferta (USD) *</label>
        <input type="number" id="formOffer" name="offer" min="1" required>
    </div>

    <div class="form-group">
        <label for="formMessage">Mensaje (Opcional)</label>
        <textarea id="formMessage" name="message" maxlength="300" rows="4"></textarea>
        <small id="charCounter">0 / 300</small>
    </div>

    <div class="form-group">
        <p style="padding: 2px; color: red;">
            Campos obligatorios señalados con (*)
        </p>
    </div>

    <!-- TURNSTILE -->
    <div class="captcha-wrapper">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADrbNnOOzWh4BbYN"></div>
    </div>

    <!-- STATUS -->
    <div id="formStatus" role="status" aria-live="polite"></div>

    <!-- BOTÓN -->
    <button type="submit" id="submitBtn" class="cta-button primary full-width">
        <i class="fas fa-paper-plane"></i>
        Enviar oferta
    </button>

    <!-- HIDDEN FIELDS -->
    <input type="hidden" name="dominio" value="SinCobertura.com">
    <input type="hidden" name="_subject" value="Nueva oferta por SinCobertura.com">

</form>

</div>
</div>
</section>

</main>

<footer class="footer">
    <div class="container">
        <p>SinCobertura.com</p>
    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
